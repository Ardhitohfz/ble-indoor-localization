; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
# Use project root as source directory; sources are included via build_src_filter per env
src_dir = .
default_envs = beacon

[env:base]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = 
	esp32_exception_decoder
	time
monitor_rts = 0
monitor_dtr = 0
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.extra_flags = 
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
build_flags = 
	-Os
	-DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO
	-Ishared/include
	-DCONFIG_NIMBLE_MAX_CONNECTIONS=4
	-DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=4
lib_deps = h2zero/NimBLE-Arduino@^2.3.6
lib_ldf_mode = chain+

[env:beacon]
extends = env:base
build_src_filter = 
	+<firmware/beacon/src>
	-<*.ini>
build_flags = 
	${env:base.build_flags}
	-Ifirmware/beacon/include
	-DROLE_BEACON
	-DDEVICE_NAME=\"VEH_BEACON\"
upload_port = COM21

[env:anchor_a]
extends = env:base
build_src_filter = 
	+<firmware/anchor/src>
	-<*.ini>
build_flags = 
	${env:base.build_flags}
	-Ifirmware/anchor/include
	-DROLE_ANCHOR
	-DANCHOR_NAME=\"ANCHOR_A\"
	-DANCHOR_INDEX=0
	-DBEACON_NAME=\"VEH_BEACON\"
	-DPARALLEL_MODE

[env:anchor_b]
extends = env:base
build_src_filter = 
	+<firmware/anchor/src>
	-<*.ini>
build_flags = 
	${env:base.build_flags}
	-Ifirmware/anchor/include
	-DROLE_ANCHOR
	-DANCHOR_NAME=\"ANCHOR_B\"
	-DANCHOR_INDEX=1
	-DBEACON_NAME=\"VEH_BEACON\"
	-DPARALLEL_MODE
upload_port = COM9

[env:anchor_c]
extends = env:base
build_src_filter = 
	+<firmware/anchor/src>
	-<*.ini>
build_flags = 
	${env:base.build_flags}
	-Ifirmware/anchor/include
	-DROLE_ANCHOR
	-DANCHOR_NAME=\"ANCHOR_C\"
	-DANCHOR_INDEX=2
	-DBEACON_NAME=\"VEH_BEACON\"
	-DPARALLEL_MODE
upload_port = COM20

[env:anchor_d]
extends = env:base
build_src_filter = 
	+<firmware/anchor/src>
	-<*.ini>
build_flags = 
	${env:base.build_flags}
	-Ifirmware/anchor/include
	-DROLE_ANCHOR
	-DANCHOR_NAME=\"ANCHOR_D\"
	-DANCHOR_INDEX=3
	-DBEACON_NAME=\"VEH_BEACON\"
	-DPARALLEL_MODE
